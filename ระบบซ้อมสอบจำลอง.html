            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-6px); }

    <script>
        let isMuted = false;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // เล่นเสียงบี๊บเบาๆ ตอนกดปุ่ม
        function playSoundClick() {
            if (isMuted) return;
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(550, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.08);
        }

        // เล่นเสียงติ้งต่อง เมื่อตอบถูก
        function playSoundCorrect() {
            if (isMuted) return;
            initAudio();
            const now = audioCtx.currentTime;
            playNote(523.25, 0.1, now); // C5
            playNote(659.25, 0.18, now + 0.08); // E5
        }

        // เล่นเสียงแง่ววว เมื่อตอบผิด
        function playSoundWrong() {
            if (isMuted) return;
            initAudio();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(170, now);
            osc.frequency.linearRampToValueAtTime(80, now + 0.35);
            gain.gain.setValueAtTime(0.07, now);
            gain.gain.linearRampToValueAtTime(0.01, now + 0.35);
            
            osc.start();
            osc.stop(now + 0.35);
        }

        // เล่นเสียงเมโลดี้ฉลองความสำเร็จ
        function playSoundVictory() {
            if (isMuted) return;
            initAudio();
            const now = audioCtx.currentTime;
            playNote(523.25, 0.12, now);       // C5
            playNote(659.25, 0.12, now + 0.12);  // E5
            playNote(783.99, 0.12, now + 0.24);  // G5
            playNote(1046.50, 0.35, now + 0.36); // C6
        }

        function playNote(frequency, duration, startTime) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(frequency, startTime);
            gain.gain.setValueAtTime(0.06, startTime);
            gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
            
            osc.start(startTime);
            osc.stop(startTime + duration);
        }

        window.toggleSound = function() {
            isMuted = !isMuted;
            const btn = document.getElementById('sound-btn');
            if (isMuted) {
                btn.innerHTML = `<i class="fa-solid fa-volume-xmark text-lg"></i>`;
                btn.classList.remove('text-orange-500');
                btn.classList.add('text-gray-400');
            } else {
                btn.innerHTML = `<i class="fa-solid fa-volume-high text-lg"></i>`;
                btn.classList.remove('text-gray-400');
                btn.classList.add('text-orange-500');
                initAudio();
                playSoundClick();
            }
        }

            while (0 !== curId) {

                curId -= 1;
                let tmp = array[curId];
                array[curId] = array[randId];
                array[randId] = tmp;

            return array;

                        <div onclick="startExam('partB')" class="mode-card glass-card p-6 purple relative overflow-hidden group">
                            <div class="absolute top-4 right-4 w-8 h-8 bg-purple-100 rounded-full group-hover:scale-150 transition-transform"></div>
                            <h3 class="text-2xl font-bold text-purple-600 mb-2">ภาค ข: นักวิชาการศึกษา (50 ข้อ)</h3>
                            <p class="text-gray-600 text-sm mb-4 leading-relaxed">สุ่มดึงมา 20 ข้อจากคลัง 50 ข้อเพื่อฝึกหลักสูตรฐานสมรรถนะ 2567 วิธีสอนผู้ใหญ่ การวิจัยในชั้นเรียน และการประกันคุณภาพ สมศ. มิติการเทียบระดับ</p>
                            <span class="inline-block bg-purple-100 text-purple-700 px-4 py-1.5 rounded-full text-xs font-bold">โหมดทาสรับใช้สมองทฤษฎี 🧠</span>
                        </div>

                        <!-- Mode 3 (Full Width) -->
                        <div onclick="startExam('mixed')" class="mode-card p-6 orange md:col-span-2 relative overflow-hidden group">
                            <div class="absolute top-4 right-4 w-10 h-10 bg-white/20 rounded-full group-hover:scale-150 transition-transform"></div>
                            <h3 class="text-2xl font-black mb-2 flex items-center gap-2">
                                <i class="fa-solid fa-fire text-yellow-300"></i> มัดรวมนรกแตก 100 ข้อ (สุ่ม ภาค ก + ข)
                            </h3>
                            <p class="text-white/90 text-sm mb-4 leading-relaxed">วัดใจอธิบดี สกร. ในฝัน! สุ่ม 20 ข้อจากคลังใหญ่ 100 ข้อแบบไร้กติกา ครอบคลุมทุกสัดส่วนคะแนนอย่างเป็นกลางที่สุด!</p>
                            <span class="inline-block bg-white/30 text-white px-4 py-1.5 rounded-full text-xs font-bold">สุ่มความฮาลุยเต็มร้อย 🔥</span>
                        </div>
                    </div>
                </div>
            `;
        }

        window.startExam = function(mode) {
            playSoundClick();
            
            let pool = [];
            if (mode === 'partA') pool = [...questionDatabase.partA];
            else if (mode === 'partB') pool = [...questionDatabase.partB];
            else pool = [...questionDatabase.partA, ...questionDatabase.partB];

            pool = shuffleArray(pool);
            examQuestions = pool.slice(0, 20); // ดึงออกมาสอบรอบละ 20 ข้อตามเงื่อนไข
            
            currentQuestionIndex = 0;
            score = 0;
            userAnswers = [];

            renderQuestion();
        }

        function renderQuestion() {
            const q = examQuestions[currentQuestionIndex];
            const progress = ((currentQuestionIndex) / 20) * 100;

            let optionsHtml = '';
            q.options.forEach((opt, idx) => {
                optionsHtml += `
                    <button onclick="handleAnswer(${idx})" class="btn-choice group flex items-center" id="opt-${idx}">
                        <span class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 font-bold mr-4 group-hover:bg-orange-100 group-hover:text-orange-500 transition-colors shrink-0">
                            ${String.fromCharCode(3601 + idx)} <!-- ก, ข, ค, ง -->
                        </span>
                        <span class="font-medium text-gray-700">${opt}</span>
                    </button>
                `;
            });

            appContainer.innerHTML = `
                <div class="glass-card p-6 sm:p-8 animate-pop">
                    
                    <!-- Progress Bar -->
                    <div class="flex justify-between items-center mb-6 text-sm font-bold text-gray-500">
                        <span>ข้อที่ ${currentQuestionIndex + 1} / 20</span>
                        <span>คะแนนสะสม: ${score}</span>
                    </div>
                    <div class="w-full bg-gray-200/60 rounded-full h-2.5 mb-8 overflow-hidden border border-gray-100">
                        <div class="bg-gradient-to-r from-orange-400 to-pink-500 h-2.5 rounded-full transition-all duration-500" style="width: ${progress}%"></div>
                    </div>

                    <!-- Question Content -->
                    <div class="flex gap-4 mb-8 flex-col sm:flex-row">
                        <div class="shrink-0 flex justify-center sm:block">
                            <div class="text-4xl bg-orange-100 w-16 h-16 rounded-2xl flex items-center justify-center border-2 border-orange-200 shadow-sm">
                                📝
                            </div>
                        </div>
                        <div>
                            <h3 class="text-xl sm:text-2xl font-bold leading-relaxed text-gray-800">
                                ${q.q}
                            </h3>
                        </div>
                    </div>

                    <!-- Options -->
                    <div class="space-y-3" id="options-container">
                        ${optionsHtml}
                    </div>

                    <!-- Mascot Feedback Area (Hidden by default) -->
                    <div id="feedback-area" class="hidden mt-8 flex gap-4 items-start flex-col sm:flex-row">
                        <div class="text-6xl shrink-0 drop-shadow-md text-center w-full sm:w-auto" id="feedback-emoji">🐱</div>
                        <div class="speech-bubble flex-grow w-full">
                            <h4 id="feedback-title" class="font-bold text-lg mb-1"></h4>
                            <p id="feedback-text" class="text-gray-700 font-medium"></p>
                            <p class="text-xs text-orange-400 font-bold mt-2">อ้างอิง: ${q.ref}</p>
                            <div class="mt-4 text-right">
                                <button onclick="nextQuestion()" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2.5 px-6 rounded-full shadow-lg transition-transform hover:scale-105 active:scale-95 text-sm">
                                    ไปต่อลุยเลย! <i class="fa-solid fa-arrow-right ml-2"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                </div>
            `;
        }

        window.handleAnswer = function(selectedIndex) {
            const buttons = document.querySelectorAll('.btn-choice');
            buttons.forEach(btn => btn.disabled = true);

            const q = examQuestions[currentQuestionIndex];
            const isCorrect = selectedIndex === q.a;
            
            if (isCorrect) {
                score++;
                playSoundCorrect();
            } else {
                playSoundWrong();
            }

            // แสดงสีที่ปุ่ม
            buttons.forEach((btn, idx) => {
                if (idx === q.a) {
                    btn.classList.add('correct');
                } else if (idx === selectedIndex && !isCorrect) {
                    btn.classList.add('wrong');
                } else {
                    btn.style.opacity = '0.5';
                }
            });

            // แสดงส่วนความเห็นสมฉุย
            const feedbackArea = document.getElementById('feedback-area');
            const feedbackEmoji = document.getElementById('feedback-emoji');
            const feedbackTitle = document.getElementById('feedback-title');
            const feedbackText = document.getElementById('feedback-text');

            feedbackArea.classList.remove('hidden');
            feedbackArea.classList.add('animate-pop');

            if (isCorrect) {
                feedbackEmoji.innerHTML = "😻";
                feedbackTitle.innerHTML = "<span class='text-green-600'><i class='fa-solid fa-check-circle mr-1'></i> ถูกต้องนะนุด! เก่งเฉย!</span>";
                feedbackText.innerText = getRandomComment(true);
            } else {
                feedbackEmoji.innerHTML = "🙀";
                feedbackTitle.innerHTML = "<span class='text-red-500'><i class='fa-solid fa-times-circle mr-1'></i> ผิดเต็มเหนี่ยวเลยนุด!</span>";
                const thaiLetter = ['ก', 'ข', 'ค', 'ง'];
                feedbackText.innerText = getRandomComment(false) + ` (เฉลยข้อที่ถูกต้องคือ: ข้อ ${thaiLetter[q.a]}. ${q.options[q.a]})`;
            }
        }

        window.nextQuestion = function() {
            playSoundClick();
            currentQuestionIndex++;
            if (currentQuestionIndex < examQuestions.length) {
                renderQuestion();
            } else {
                renderResult();
            }
        }

        function renderResult() {
            playSoundVictory();

            let rank = "";
            let message = "";
            let emoji = "";

            if (score >= 18) {
                rank = "เทพเจ้าสกร. จุติเกิดใหม่! 🌟";
                message = "กราบขอแนวทางจากท่านด่วน! ความรู้รอบด้านปานปลัดกระทรวงมาเอง สมฉุยยกปลาทูให้ทั้งคลังเลยนุด!";
                emoji = "👑🐱👑";
            } else if (score >= 12) {
                rank = "นักรบผู้พอประคองตัวพ้นน้ำ ⛵";
                message = "ถือว่ายังเอาชีวิตรอดได้ในด่านหฤโหดนี้ ทบทวนความจำเพิ่มอีกสักนิด รับรองว่าสอบจริงเกียรตินิยมแน่นอน!";
                emoji = "😎🐱✌️";
            } else {
                rank = "ศพนักสอบสีพาสเทล 🌸💀";
                message = "โอ๊ยยย นุดดด! คะแนนแบบนี้เจ้าหน้าที่ สกร. ได้ดึงมึงกลับเข้ามาติวใหม่แน่ รีบไปหาข้อมูลเพิ่มเติมด่วนๆ เลยจ้า!";
                emoji = "🥀🙀🥀";
            }

            appContainer.innerHTML = `
                <div class="glass-card p-8 text-center animate-pop">
                    
                    <div class="text-7xl mb-4 drop-shadow-lg">${emoji}</div>
                    
                    <h2 class="text-3xl font-black mb-2 text-[#2c3e50]">ประเมินผลการรบของนุด!</h2>
                    <p class="text-gray-500 mb-8 font-medium">คะแนนความจำคลังสมองของนุดจากระบบสอบ 20 ข้อ</p>

                    <div class="inline-block bg-white border-4 border-orange-200 rounded-[2.5rem] py-6 px-12 mb-8 shadow-inner">
                        <div class="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-pink-500">
                            ${score} / 20
                        </div>
                        <div class="text-xs font-black text-gray-400 mt-2 uppercase tracking-widest">Score Card</div>
                    </div>

                    <h3 class="text-2xl font-bold text-orange-600 mb-2">ฉายา: ${rank}</h3>
                    <p class="text-gray-700 text-lg mb-10 max-w-lg mx-auto leading-relaxed">"${message}"</p>

                    <button onclick="renderHome(); playSoundClick();" class="bg-gradient-to-r from-pink-500 to-orange-500 hover:from-pink-600 hover:to-orange-600 text-white font-bold py-4 px-12 rounded-full shadow-xl transition-all transform hover:scale-105 active:scale-95 text-lg">
                        <i class="fa-solid fa-rotate-right mr-2"></i> วิ่งชนคลังใหม่อีกสักรอบ!
                    </button>
                </div>
            `;
            
            createConfetti();
        }

        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                const conf = document.createElement('div');
                conf.style.position = 'fixed';
                conf.style.width = '12px';
                conf.style.height = '12px';
                conf.style.backgroundColor = ['#fca311', '#ffb703', '#fde2e4', '#e2ece9', '#e0fbfc', '#ffcad4'][Math.floor(Math.random() * 6)];
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = '-15px';
                conf.style.borderRadius = '50%';
                conf.style.zIndex = '9999';
                conf.style.pointerEvents = 'none';
                
                const animDuration = Math.random() * 3 + 2.5;
                conf.animate([
                    { transform: `translate3d(0,0,0) rotate(0deg)`, opacity: 1 },
                    { transform: `translate3d(${Math.random()*250 - 125}px, 100vh, 0) rotate(${Math.random()*720}deg)`, opacity: 0 }
                ], {
                    duration: animDuration * 1000,
                    easing: 'cubic-bezier(.25,.8,.25,1)',
                    fill: 'forwards'
                });

                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), animDuration * 1000);
            }
        }

        window.onload = () => {
            renderHome();
        };

    </script>
</body>
</html>
